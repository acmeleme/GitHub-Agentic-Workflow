name: GitHub Agentic Workflow Demo

on:
  issues:
    types: [opened, labeled, edited]
  workflow_dispatch:
    inputs:
      feature_summary:
        description: Feature or bug request to run through Architect → Developer → QA
        required: true
        type: string
      priority:
        description: Priority for the run
        required: true
        default: medium
        type: choice
        options:
          - low
          - medium
          - high
      issue_number:
        description: Optional issue number to attach updates to
        required: false
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: agentic-demo-${{ github.event.issue.number || github.event.inputs.issue_number || github.run_id }}
  cancel-in-progress: true

jobs:
  intake:
    name: Intake
    runs-on: ubuntu-latest
    outputs:
      run_demo: ${{ steps.intake.outputs.run_demo }}
      request_text: ${{ steps.intake.outputs.request_text }}
      source_ref: ${{ steps.intake.outputs.source_ref }}
      tracking_id: ${{ steps.intake.outputs.tracking_id }}
      issue_number: ${{ steps.intake.outputs.issue_number }}
      priority: ${{ steps.intake.outputs.priority }}
      skip_reason: ${{ steps.intake.outputs.skip_reason }}
    steps:
      - id: intake
        uses: actions/github-script@v7
        with:
          script: |
            const eventName = context.eventName;
            const action = context.payload.action || "";
            const issue = context.payload.issue;
            const labels = issue?.labels?.map(l => l.name) || [];
            const issueNumberFromEvent = issue?.number ? String(issue.number) : "";
            const issueNumberFromInput = core.getInput("issue_number");
            const issueNumber = issueNumberFromInput || issueNumberFromEvent;

            const issueTitle = issue?.title || "";
            const issueBody = issue?.body || "";
            const hasAgenticLabel = labels.includes("agentic-demo");
            const hasDemoTitlePrefix = issueTitle.toLowerCase().startsWith("[agentic demo]");
            const labeledName = context.payload.label?.name || "";
            const isAgenticLabelEvent = action === "labeled" && labeledName === "agentic-demo";
            const issueCreatedAt = issue?.created_at ? new Date(issue.created_at).getTime() : 0;
            const issueAgeSeconds = issueCreatedAt ? Math.floor((Date.now() - issueCreatedAt) / 1000) : 999999;
            const shouldSkipDuplicateLabelEvent = isAgenticLabelEvent && issueAgeSeconds < 45;

            const runFromIssue = eventName === "issues" && (
              ((action === "opened" || action === "edited") && (hasAgenticLabel || hasDemoTitlePrefix)) ||
              isAgenticLabelEvent
            ) && !shouldSkipDuplicateLabelEvent;
            const runFromManual = eventName === "workflow_dispatch";
            const runDemo = runFromIssue || runFromManual;
            const skipReason = runDemo
              ? ""
              : `Issue did not match demo trigger. action=${action}, labeled_name=${labeledName}, has_label=${hasAgenticLabel}, title_prefix=${hasDemoTitlePrefix}, issue_age_seconds=${issueAgeSeconds}`;

            const requestFromIssue = [issueTitle, issueBody].filter(Boolean).join("\n\n").trim();
            const requestFromManual = core.getInput("feature_summary");
            const requestText = (requestFromManual || requestFromIssue || "No request details provided").trim();
            const priority = core.getInput("priority") || "medium";

            const sourceRef = issueNumber ? `issue#${issueNumber}` : "manual";
            const trackingId = `AGD-${context.runId}-${Date.now()}`;

            core.setOutput("run_demo", String(runDemo));
            core.setOutput("request_text", requestText);
            core.setOutput("source_ref", sourceRef);
            core.setOutput("tracking_id", trackingId);
            core.setOutput("issue_number", issueNumber);
            core.setOutput("priority", priority);
            core.setOutput("skip_reason", skipReason);

            if (runDemo && issueNumber) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: Number(issueNumber),
                body: [
                  `🚀 Agentic demo started`,
                  `- Tracking: ${trackingId}`,
                  `- Source: ${sourceRef}`,
                  `- Priority: ${priority}`,
                  `- Pipeline: Architect → Developer → QA`
                ].join("\n")
              });
            }

            if (!runDemo && issueNumber) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: Number(issueNumber),
                body: [
                  `⏭️ Agentic demo skipped`,
                  `- Reason: ${skipReason}`,
                  `- To trigger: add label \`agentic-demo\` or use title prefix \`[Agentic Demo]\`.`
                ].join("\n")
              });
            }

  architect:
    name: Architect
    needs: intake
    if: needs.intake.outputs.run_demo == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Build architecture handoff
        run: |
          mkdir -p out
          cat > out/architect-report.md << 'EOF'
          # Architect Report

          ## Tracking
          - ID: ${{ needs.intake.outputs.tracking_id }}
          - Source: ${{ needs.intake.outputs.source_ref }}
          - Priority: ${{ needs.intake.outputs.priority }}

          ## Normalized Request
          ${{ needs.intake.outputs.request_text }}

          ## Proposed Solution
          - Clarify scope and non-goals from request.
          - Identify impacted modules and interfaces.
          - Define acceptance criteria with observable outcomes.

          ## Task Breakdown
          1. Create or update implementation files.
          2. Add or update tests for acceptance criteria.
          3. Update docs and usage notes.

          ## Acceptance Criteria
          - Requirements are implemented and traceable.
          - Tests pass for changed behavior.
          - Documentation includes what changed and how to validate.
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: architect-report
          path: out/architect-report.md

      - name: Post architect status
        if: needs.intake.outputs.issue_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(`${{ needs.intake.outputs.issue_number }}`),
              body: [
                `🏗️ Architect completed`,
                `- Tracking: ${{ needs.intake.outputs.tracking_id }}`,
                `- Artifact: architect-report`
              ].join("\n")
            });

  developer:
    name: Developer
    needs: [intake, architect]
    if: needs.intake.outputs.run_demo == 'true'
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.pr_meta.outputs.pr_number }}
      pr_url: ${{ steps.pr_meta.outputs.pr_url }}
      pr_status: ${{ steps.pr_meta.outputs.pr_status }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: architect-report
          path: in

      - name: Generate implementation
        run: |
          mkdir -p generated-app
          cat > generated-app/app.py << 'EOF'
          from flask import Flask, redirect, render_template_string, request, session, url_for
          import random

          app = Flask(__name__)
          app.secret_key = "agentic-demo-hangman-secret"

          WORDS = ["BRASILIA", "SALVADOR", "RECIFE", "MANAUS", "CURITIBA"]
          MAX_ERRORS = 6

          PAGE = """
          <!doctype html>
          <html lang="pt-BR">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>Jogo da Forca - Capitais Brasileiras</title>
              <style>
                body { font-family: Arial, sans-serif; margin: 2rem; color: #1f2937; }
                .card { max-width: 640px; padding: 1.25rem; border: 1px solid #e5e7eb; border-radius: 10px; }
                .word { font-size: 2rem; letter-spacing: 0.4rem; margin: 1rem 0; font-weight: bold; }
                .status { margin: 0.6rem 0; }
                .ok { color: #065f46; }
                .fail { color: #991b1b; }
                input { font-size: 1rem; width: 3rem; text-align: center; text-transform: uppercase; }
                button { margin-left: 0.5rem; }
                .meta { color: #4b5563; font-size: 0.95rem; }
                .letters { margin-top: 0.7rem; }
              </style>
            </head>
            <body>
              <div class="card">
                <h1>Jogo da Forca</h1>
                <p class="meta">Tema: capitais brasileiras (5 palavras fixas)</p>

                <div class="word">{{ masked_word }}</div>
                <div class="status">Tentativas restantes: <strong>{{ remaining }}</strong></div>
                <div class="letters">Letras usadas: {{ used_letters or "(nenhuma)" }}</div>

                {% if won %}
                  <p class="status ok"><strong>Você venceu!</strong> A palavra era {{ word }}.</p>
                {% elif lost %}
                  <p class="status fail"><strong>Você perdeu!</strong> A palavra era {{ word }}.</p>
                {% endif %}

                {% if not won and not lost %}
                  <form method="post" action="{{ url_for('guess') }}">
                    <label for="letter">Letra:</label>
                    <input id="letter" name="letter" maxlength="1" required autofocus />
                    <button type="submit">Tentar</button>
                  </form>
                {% endif %}

                <form method="post" action="{{ url_for('reset') }}" style="margin-top: 0.9rem;">
                  <button type="submit">Reiniciar jogo</button>
                </form>
              </div>
            </body>
          </html>
          """


          def start_new_game():
              session["word"] = random.choice(WORDS)
              session["used_letters"] = []
              session["errors"] = 0


          def current_state():
              if "word" not in session:
                  start_new_game()

              word = session["word"]
              used_letters = session.get("used_letters", [])
              errors = int(session.get("errors", 0))

              masked_word = " ".join([char if char in used_letters else "_" for char in word])
              won = all(char in used_letters for char in word)
              lost = errors >= MAX_ERRORS
              remaining = MAX_ERRORS - errors

              return {
                  "word": word,
                  "masked_word": masked_word,
                  "used_letters": " ".join(used_letters),
                  "won": won,
                  "lost": lost,
                  "remaining": remaining,
              }


          @app.get("/")
          def index():
              return render_template_string(PAGE, **current_state())


          @app.post("/guess")
          def guess():
              state = current_state()
              if state["won"] or state["lost"]:
                  return redirect(url_for("index"))

              letter = (request.form.get("letter", "").strip().upper())[:1]
              if not letter or not letter.isalpha():
                  return redirect(url_for("index"))

              used_letters = session.get("used_letters", [])
              if letter in used_letters:
                  return redirect(url_for("index"))

              used_letters.append(letter)
              session["used_letters"] = used_letters

              if letter not in session["word"]:
                  session["errors"] = int(session.get("errors", 0)) + 1

              return redirect(url_for("index"))


          @app.post("/reset")
          def reset():
              start_new_game()
              return redirect(url_for("index"))


          if __name__ == "__main__":
              app.run(host="0.0.0.0", port=8000)
          EOF

          cat > generated-app/requirements.txt << 'EOF'
          flask==3.1.0
          EOF

          cat > generated-app/README.md << EOF
          # Generated App - Jogo da Forca

          This app was generated by the Developer stage of the agentic workflow.

          ## Request Source
          - ${{ needs.intake.outputs.source_ref }}

          ## Functional Scope
          - Hangman game (forca) with fixed Brazilian capitals.
          - Candidate words: BRASILIA, SALVADOR, RECIFE, MANAUS, CURITIBA.
          - Supports letter guessing, win/loss state, and restart.

          ## Run locally
          \
          pip install -r generated-app/requirements.txt
          python generated-app/app.py
          \

          ## Usage
          - Open http://localhost:8000
          - Type one letter per attempt and submit.
          - Click restart to start a new round.
          EOF

          cat > generated-app/.generated-run.txt << EOF
          tracking_id=${{ needs.intake.outputs.tracking_id }}
          request=${{ needs.intake.outputs.request_text }}
          generated_at=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: generated-app
          path: generated-app

      - name: Create developer PR
        id: create_pr
        continue-on-error: true
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat(agentic-demo): generated app for ${{ needs.intake.outputs.source_ref }}"
          branch: "demo/${{ needs.intake.outputs.tracking_id }}"
          title: "feat(agentic-demo): implement request from ${{ needs.intake.outputs.source_ref }}"
          body: |
            ## Agentic Developer Output
            - Tracking: ${{ needs.intake.outputs.tracking_id }}
            - Source: ${{ needs.intake.outputs.source_ref }}
            - Request:
              ${{ needs.intake.outputs.request_text }}

            ## Generated Files
            - generated-app/app.py
            - generated-app/requirements.txt
            - generated-app/README.md
            - generated-app/.generated-run.txt

      - name: Fallback push generated branch
        id: fallback_push
        if: steps.create_pr.outcome != 'success'
        continue-on-error: true
        run: |
          branch_name="demo/${{ needs.intake.outputs.tracking_id }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch_name"
          git add generated-app

          if git diff --cached --quiet; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "branch_name=$branch_name" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "feat(agentic-demo): generated app for ${{ needs.intake.outputs.source_ref }}"
          git push --set-upstream origin "$branch_name"

          echo "pushed=true" >> "$GITHUB_OUTPUT"
          echo "branch_name=$branch_name" >> "$GITHUB_OUTPUT"

      - name: Resolve PR metadata
        id: pr_meta
        run: |
          branch_name="demo/${{ needs.intake.outputs.tracking_id }}"
          create_pr_outcome="${{ steps.create_pr.outcome }}"
          pr_number="${{ steps.create_pr.outputs.pull-request-number }}"
          pr_url="${{ steps.create_pr.outputs.pull-request-url }}"
          fallback_pushed="${{ steps.fallback_push.outputs.pushed }}"

          if [ "$create_pr_outcome" = "success" ] && [ -n "$pr_number" ]; then
            pr_status="created"
          elif [ "$fallback_pushed" = "true" ]; then
            pr_status="branch-pushed-pr-manual"
            pr_number=""
            pr_url="https://github.com/${{ github.repository }}/pull/new/$branch_name"
          else
            pr_status="manual-required"
            pr_number=""
            pr_url="https://github.com/${{ github.repository }}/pull/new/$branch_name"
          fi

          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"
          echo "pr_status=$pr_status" >> "$GITHUB_OUTPUT"

      - name: Build developer handoff
        run: |
          mkdir -p out
          cat > out/developer-report.md << EOF
          # Developer Report

          ## Tracking
          - ID: ${{ needs.intake.outputs.tracking_id }}

          ## Inputs
          - Architect handoff: in/architect-report.md

          ## Implementation Summary
          - Generated a runnable Flask hangman web app.
          - Configured the word list with 5 Brazilian capitals.
          - Added dependency file and app-specific README.
          - Uploaded generated code as workflow artifact: generated-app.

          ## Pull Request
          - Number: ${{ steps.pr_meta.outputs.pr_number }}
          - URL: ${{ steps.pr_meta.outputs.pr_url }}
          - Status: ${{ steps.pr_meta.outputs.pr_status }}
          - Branch: demo/${{ needs.intake.outputs.tracking_id }}
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: developer-report
          path: out/developer-report.md

      - name: Post developer status
        if: needs.intake.outputs.issue_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(`${{ needs.intake.outputs.issue_number }}`),
              body: [
                `💻 Developer completed`,
                `- Tracking: ${{ needs.intake.outputs.tracking_id }}`,
                `- PR: ${{ steps.pr_meta.outputs.pr_url }}`,
                `- PR Status: ${{ steps.pr_meta.outputs.pr_status }}`,
                `- Artifact: developer-report`
              ].join("\n")
            });

  qa:
    name: QA
    needs: [intake, developer]
    if: needs.intake.outputs.run_demo == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: developer-report
          path: in

      - name: Build QA handoff
        run: |
          mkdir -p out
          cat > out/qa-report.md << 'EOF'
          # QA Report

          ## Tracking
          - ID: ${{ needs.intake.outputs.tracking_id }}

          ## Verification Scope
          - Validate acceptance criteria coverage.
          - Validate test strategy and quality gates.
          - Capture go/no-go recommendation.

          ## Pull Request Under Review
          - Number: ${{ needs.developer.outputs.pr_number }}
          - URL: ${{ needs.developer.outputs.pr_url }}

          ## Result
          - Status: ✅ Demo Pass
          - Findings: No blocking defects in mocked flow.
          - Recommendation: Approve for demo merge gate.
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: qa-report
          path: out/qa-report.md

      - name: Post QA status
        if: needs.intake.outputs.issue_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(`${{ needs.intake.outputs.issue_number }}`),
              body: [
                `🧪 QA completed`,
                `- Tracking: ${{ needs.intake.outputs.tracking_id }}`,
                `- Result: Demo Pass`,
                `- Artifact: qa-report`
              ].join("\n")
            });

  summary:
    name: Summary
    needs: [intake, architect, developer, qa]
    if: always() && needs.intake.outputs.run_demo == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Build summary
        run: |
          mkdir -p out
          cat > out/execution-summary.md << 'EOF'
          # Agentic Workflow Execution Summary

          - Tracking: ${{ needs.intake.outputs.tracking_id }}
          - Source: ${{ needs.intake.outputs.source_ref }}
          - PR: ${{ needs.developer.outputs.pr_url }}
          - Architect: ${{ needs.architect.result }}
          - Developer: ${{ needs.developer.result }}
          - QA: ${{ needs.qa.result }}

          ## Outcome
          - End-to-end role flow executed.
          - Artifacts generated for all role handoffs.
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: execution-summary
          path: out/execution-summary.md

      - name: Post final summary to issue
        if: needs.intake.outputs.issue_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(`${{ needs.intake.outputs.issue_number }}`),
              body: [
                `✅ Agentic demo finished`,
                `- Tracking: ${{ needs.intake.outputs.tracking_id }}`,
                `- PR: ${{ needs.developer.outputs.pr_url }}`,
                `- Architect: ${{ needs.architect.result }}`,
                `- Developer: ${{ needs.developer.result }}`,
                `- QA: ${{ needs.qa.result }}`,
                `- Artifact: execution-summary`
              ].join("\n")
            });
